<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>副業タイプ診断【簡易版】</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;padding:0;">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ★ LINEのURLをここだけ変えればOK ★
const LINE_URL = "https://lin.ee/XXXXXXXX";

const QUESTIONS = [
  { id:1, q:"仕事で一番テンションが上がる瞬間は？", opts:[
    { label:"ゼロから何かを作り上げた時", scores:{creative:3,solo:1} },
    { label:"誰かの役に立てた・感謝された時", scores:{people:3,service:1} },
    { label:"数字やデータがぴったり揃った時", scores:{analytical:3,solo:1} },
    { label:"自分のアイデアが認められた時", scores:{creative:2,social:2} },
  ]},
  { id:2, q:"理想の働き方は？", opts:[
    { label:"ひとりで黙々と集中したい", scores:{solo:3,analytical:1} },
    { label:"人と話しながら進めたい", scores:{people:3,social:2} },
    { label:"場所や時間を自由に選びたい", scores:{creative:2,digital:2} },
    { label:"明確なルールの中でコツコツ", scores:{steady:3,service:1} },
  ]},
  { id:3, q:"自分が一番得意なことは？", opts:[
    { label:"文章・言葉で伝えること", scores:{writing:3,creative:1} },
    { label:"人を動かす・引きつけること", scores:{people:3,social:2} },
    { label:"情報を整理・分析すること", scores:{analytical:3,knowledge:2} },
    { label:"手や技術で何かを作ること", scores:{technical:3,solo:1} },
  ]},
  { id:4, q:"副業に使える時間は週どれくらい？", opts:[
    { label:"5時間以下（スキマ時間だけ）", scores:{steady:2,digital:1} },
    { label:"5〜15時間（週末＋平日少し）", scores:{creative:1,service:1} },
    { label:"15〜30時間（本気で確保する）", scores:{technical:2,analytical:1} },
    { label:"30時間以上（副業メインでいける）", scores:{technical:2,people:1} },
  ]},
  { id:5, q:"収入に対して一番大事にしていることは？", opts:[
    { label:"少額でも今すぐ稼ぎたい", scores:{steady:2,service:2} },
    { label:"時間がかかっても高単価を狙いたい", scores:{technical:2,analytical:2} },
    { label:"寝ながら稼げる仕組みが欲しい", scores:{creative:2,digital:2} },
    { label:"好きなことでお金になればいい", scores:{people:2,writing:1} },
  ]},
  { id:6, q:"一番ストレスを感じる状況は？", opts:[
    { label:"ずっと人と話し続けること", scores:{solo:2,analytical:1} },
    { label:"成果が見えない単調な作業", scores:{creative:2,people:1} },
    { label:"収入が不安定で先が見えないこと", scores:{steady:2,service:1} },
    { label:"ガチガチのルールや締め切り", scores:{creative:1,digital:1} },
  ]},
  { id:7, q:"SNSやネットで自然とやっていることは？", opts:[
    { label:"リサーチ・情報収集が趣味レベル", scores:{analytical:2,knowledge:2} },
    { label:"発信・投稿・コメントが自然にできる", scores:{social:3,creative:1} },
    { label:"動画・画像・デザインをよく触る", scores:{creative:2,digital:2} },
    { label:"商品やサービスをとことん比較する", scores:{steady:1,analytical:2} },
  ]},
  { id:8, q:"3年後の理想の副業像は？", opts:[
    { label:"本業を辞めて独立・フリーランス", scores:{technical:2,creative:2} },
    { label:"月5〜10万円の安定した副収入", scores:{steady:3,service:1} },
    { label:"自分のブランド・メディアを持つ", scores:{creative:2,social:2} },
    { label:"専門家として高単価案件を受ける", scores:{analytical:2,knowledge:2} },
  ]},
  { id:9, q:"副業で一番手に入れたいものは？", opts:[
    { label:"時間と場所の自由", scores:{digital:3,solo:1} },
    { label:"自己表現・クリエイティブの場", scores:{creative:3,writing:1} },
    { label:"人とのつながり・感謝される体験", scores:{people:3,service:1} },
    { label:"専門性・スキルの証明", scores:{analytical:2,technical:2} },
  ]},
  { id:10, q:"新しいことを始める時のスタイルは？", opts:[
    { label:"全体を把握してから動く", scores:{analytical:2,knowledge:2} },
    { label:"とにかく手を動かして覚える", scores:{technical:2,creative:1} },
    { label:"誰かに教わりながら進める", scores:{people:2,service:1} },
    { label:"ネットで調べて自己流でやる", scores:{digital:2,solo:1} },
  ]},
];

const RESULTS = [
  { id:"engineer", title:"フリーランスエンジニア", icon:"⌨️", color:"#B8860B",
    catch:"コードが最強の武器になる",
    desc:"技術力をそのまま収益に変えられる副業の最高峰。AIを使えば開発速度が10倍になる今が、エンジニア副業を始める最大のチャンスです。",
    income:"月5万〜150万円", timeline:"6〜12ヶ月",
    steps:["HTML/CSS/JSの基礎を2〜3ヶ月で固める","架空案件でポートフォリオを3つ作る","クラウドワークスで初案件を受注する"],
    keys:["technical","analytical","solo","digital"] },
  { id:"creator", title:"SNS・動画クリエイター", icon:"🎬", color:"#C0392B",
    catch:"発信力がそのままお金になる",
    desc:"TikTok・Instagram・YouTubeで自分のコンテンツを発信し、フォロワーをファンに変えて収益化。ブランドコラボやデジタル販売で複数収益源を作れます。",
    income:"月1万〜100万円", timeline:"3〜8ヶ月",
    steps:["発信テーマを1つだけ決める","週3投稿を90日間やり切る","1,000フォロワーでマネタイズ開始"],
    keys:["creative","social","digital","writing"] },
  { id:"writer", title:"Webライター・note作家", icon:"✍️", color:"#27AE60",
    catch:"言葉が資産になる副業",
    desc:"クラウドソーシングで実績を積みながら、自分のブログやnoteでメディアを育てる。今日から始められて、書けば書くほど価値が積み上がります。",
    income:"月1万〜50万円", timeline:"1〜3ヶ月",
    steps:["クラウドワークスに登録して初案件を取る","得意ジャンル1つに特化して単価を上げる","noteで自分メディアを育てていく"],
    keys:["writing","creative","solo","knowledge"] },
  { id:"consultant", title:"フリーランスコンサル", icon:"📊", color:"#2980B9",
    catch:"本業スキルがそのまま高単価に化ける",
    desc:"マーケティング・人事・財務など、本業で培ったスキルを副業に転換する最短ルート。1案件で数十万円が動く世界に踏み込めます。",
    income:"月10万〜200万円", timeline:"6〜18ヶ月",
    steps:["本業の専門領域を一言で言語化する","SNSで専門家として発信を始める","ランサーズで初案件を受注する"],
    keys:["analytical","knowledge","technical","steady"] },
  { id:"coach", title:"オンライン講師・コーチ", icon:"🎓", color:"#8E44AD",
    catch:"あなたの「当たり前」が誰かの宝になる",
    desc:"自分の知識・経験を「教える」ことで収益化。ストアカやUdemyで始めて、リピーターが生まれると収入が自然に安定していきます。",
    income:"月3万〜80万円", timeline:"1〜2ヶ月",
    steps:["教えられることを10個書き出す","ストアカで無料体験レッスンを開く","Udemyで動画講座を作り受動収入へ"],
    keys:["people","service","social","knowledge"] },
  { id:"marketer", title:"Webマーケター・広告運用", icon:"📈", color:"#D35400",
    catch:"数字を動かすスキルは一生モノ",
    desc:"Google・Meta広告の運用やSEO改善で中小企業の集客を支援。データを読んでPDCAを回せれば、成果報酬型で青天井の収益も狙えます。",
    income:"月5万〜100万円", timeline:"3〜6ヶ月",
    steps:["Google・Meta広告の基礎を学ぶ","自分のSNSで実績を作る","ランサーズで初案件を受注する"],
    keys:["analytical","social","digital","steady"] },
  { id:"designer", title:"グラフィック・UIデザイナー", icon:"🎨", color:"#C0185D",
    catch:"センスが収益に直結する仕事",
    desc:"ロゴ・バナー・LP・UIデザインなど、視覚的価値を生み出す副業。CanvaからFigmaへとスキルアップするほど単価が指数関数的に上がります。",
    income:"月3万〜80万円", timeline:"3〜9ヶ月",
    steps:["Canvaで実績を作りロゴ・バナーを受注","Figmaを学んでWebデザインへ進化","ポートフォリオサイトを作って発信"],
    keys:["creative","technical","digital","solo"] },
  { id:"handmade", title:"物販・ハンドメイド・転売", icon:"📦", color:"#16A085",
    catch:"今日からゼロ円で始められる",
    desc:"メルカリで不用品を売るところからスタートして、仕入れ・転売・ハンドメイドへとステップアップ。初期投資ゼロで「稼ぐ感覚」を最速で体験できます。",
    income:"月1万〜50万円", timeline:"即日〜1ヶ月",
    steps:["家の不用品を10点出品してみる","売れたカテゴリでリサーチ・仕入れへ","minneやCreemaでオリジナル商品へ"],
    keys:["steady","service","digital","solo"] },
];

function calcResult(answers) {
  const total = {};
  answers.forEach(s => Object.entries(s).forEach(([k,v]) => { total[k]=(total[k]||0)+v; }));
  return RESULTS.map(r => ({ ...r, score: r.keys.reduce((s,k)=>s+(total[k]||0),0) }))
    .sort((a,b)=>b.score-a.score)[0];
}

function App() {
  const [phase, setPhase] = useState("intro");
  const [qIdx, setQIdx] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [sel, setSel] = useState(null);
  const [fading, setFading] = useState(false);
  const [result, setResult] = useState(null);
  const [rev, setRev] = useState(0);

  useEffect(() => {
    if (phase !== "result") return;
    let i = 0;
    const t = setInterval(() => { i++; setRev(i); if (i >= 10) clearInterval(t); }, 120);
    return () => clearInterval(t);
  }, [phase]);

  const handleSel = (opt, idx) => {
    if (fading || sel !== null) return;
    setSel(idx);
    setTimeout(() => {
      const na = [...answers, opt.scores];
      if (qIdx + 1 >= QUESTIONS.length) {
        setResult(calcResult(na));
        setFading(true);
        setTimeout(() => { setPhase("result"); setFading(false); }, 400);
      } else {
        setFading(true);
        setTimeout(() => { setAnswers(na); setQIdx(qIdx+1); setSel(null); setFading(false); window.scrollTo(0,0); }, 350);
      }
    }, 280);
  };

  const restart = () => {
    setPhase("intro"); setQIdx(0); setAnswers([]); setSel(null);
    setFading(false); setResult(null); setRev(0); window.scrollTo(0,0);
  };

  const progress = Math.round((qIdx / QUESTIONS.length) * 100);

  return (
    <div style={{minHeight:"100vh",background:"#F5F3EF",fontFamily:"'Hiragino Sans','Yu Gothic',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",padding:"32px 20px"}}>
      <style>{`
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
        .opt:hover{background:#fff!important;border-color:#333!important;transform:translateX(4px)!important}
        .start-btn:hover{background:#1a1a1a!important;transform:scale(1.02)!important}
        .line-btn:hover{opacity:.85!important;transform:scale(1.02)!important}
        .rb:hover{background:#e8e4de!important}
      `}</style>

      <div style={{width:"100%",maxWidth:560}}>

        {/* INTRO */}
        {phase==="intro" && (
          <div style={{animation:"scaleIn .45s ease-out"}}>
            <div style={{textAlign:"center",marginBottom:40}}>
              <div style={{display:"inline-block",background:"#1a1a1a",color:"#F5F3EF",fontSize:12,letterSpacing:3,padding:"7px 18px",borderRadius:2,marginBottom:28}}>副業タイプ診断</div>
              <h1 style={{fontSize:34,fontWeight:700,color:"#1a1a1a",lineHeight:1.45,margin:"0 0 16px"}}>あなたに合う副業、<br/>10問で見つけよう</h1>
              <p style={{color:"#555",fontSize:16,lineHeight:1.9,margin:"0 0 36px"}}>質問に答えるだけで<br/>あなたにぴったりの副業タイプがわかります</p>
              <button className="start-btn" onClick={()=>setPhase("quiz")} style={{background:"#1a1a1a",color:"#F5F3EF",border:"none",borderRadius:6,padding:"18px 56px",fontSize:17,fontWeight:700,cursor:"pointer",transition:"all .2s",letterSpacing:1}}>診断スタート →</button>
              <p style={{color:"#999",fontSize:13,marginTop:14}}>所要時間 約1分 / 10問</p>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:9,justifyContent:"center"}}>
              {RESULTS.map(r=>(
                <div key={r.id} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",background:"#fff",border:"1.5px solid #ddd",borderRadius:20,fontSize:13,color:"#444"}}>
                  {r.icon} {r.title}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* QUIZ */}
        {phase==="quiz" && (
          <div style={{opacity:fading?0:1,transform:fading?"translateX(-12px)":"translateX(0)",transition:"all .3s ease"}}>
            <div style={{marginBottom:32}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontSize:14,color:"#555",fontWeight:700}}>Q{qIdx+1} / {QUESTIONS.length}</span>
                <span style={{fontSize:14,color:"#555"}}>{progress}%</span>
              </div>
              <div style={{height:5,background:"#ddd",borderRadius:5,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${progress}%`,background:"#1a1a1a",borderRadius:5,transition:"width .4s ease"}}/>
              </div>
            </div>
            <div style={{background:"#fff",border:"2px solid #1a1a1a",borderRadius:12,padding:"26px 24px",marginBottom:18,animation:"fadeUp .35s ease-out"}}>
              <h2 style={{fontSize:20,fontWeight:700,color:"#1a1a1a",lineHeight:1.6,margin:0}}>{QUESTIONS[qIdx].q}</h2>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {QUESTIONS[qIdx].opts.map((opt,idx)=>(
                <button key={idx} className="opt" onClick={()=>handleSel(opt,idx)} style={{
                  background:sel===idx?"#fff":"#EDEAE4",
                  border:sel===idx?"2px solid #1a1a1a":"2px solid #C8C4BC",
                  borderRadius:10,padding:"16px 18px",textAlign:"left",
                  color:"#1a1a1a",fontSize:15,fontWeight:sel===idx?700:500,
                  cursor:"pointer",transition:"all .15s ease",
                  animation:`fadeUp .35s ease-out ${idx*.06}s both`,
                  display:"flex",alignItems:"center",gap:14,
                }}>
                  <span style={{width:22,height:22,borderRadius:"50%",border:sel===idx?"2px solid #1a1a1a":"2px solid #999",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,background:sel===idx?"#1a1a1a":"transparent"}}>
                    {sel===idx && <span style={{width:8,height:8,borderRadius:"50%",background:"#fff",display:"block"}}/>}
                  </span>
                  {opt.label}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* RESULT */}
        {phase==="result" && result && (
          <div style={{animation:"scaleIn .45s ease-out"}}>
            <div style={{background:"#fff",border:"2px solid #1a1a1a",borderRadius:14,padding:"32px 28px",marginBottom:18,textAlign:"center",opacity:rev>=1?1:0,transition:"opacity .4s"}}>
              <div style={{fontSize:12,fontWeight:700,letterSpacing:3,color:"#888",marginBottom:14}}>診断結果</div>
              <div style={{fontSize:64,marginBottom:14}}>{result.icon}</div>
              <div style={{display:"inline-block",background:result.color,color:"#fff",fontSize:13,fontWeight:700,padding:"5px 16px",borderRadius:20,marginBottom:14,letterSpacing:1}}>あなたの副業タイプ</div>
              <h2 style={{fontSize:28,fontWeight:800,color:"#1a1a1a",margin:"0 0 10px"}}>{result.title}</h2>
              <p style={{fontSize:17,color:result.color,fontWeight:700,margin:"0 0 18px"}}>{result.catch}</p>
              <p style={{fontSize:15,color:"#444",lineHeight:1.9,margin:0}}>{result.desc}</p>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18,opacity:rev>=2?1:0,transition:"opacity .4s .1s"}}>
              {[{label:"💰 想定収入",value:result.income},{label:"⏱ 収益化まで",value:result.timeline}].map(({label,value})=>(
                <div key={label} style={{background:"#fff",border:"2px solid #1a1a1a",borderRadius:10,padding:"18px 14px",textAlign:"center"}}>
                  <div style={{fontSize:13,color:"#666",fontWeight:600,marginBottom:8}}>{label}</div>
                  <div style={{fontSize:16,fontWeight:800,color:"#1a1a1a"}}>{value}</div>
                </div>
              ))}
            </div>

            <div style={{background:"#fff",border:"2px solid #1a1a1a",borderRadius:12,padding:"24px",marginBottom:18,opacity:rev>=3?1:0,transition:"opacity .4s .2s"}}>
              <div style={{fontSize:14,fontWeight:800,color:"#1a1a1a",letterSpacing:1,marginBottom:18}}>🗺 はじめの3ステップ</div>
              {result.steps.map((s,i)=>(
                <div key={i} style={{display:"flex",alignItems:"flex-start",gap:14,paddingBottom:i<2?"16px":"0",marginBottom:i<2?"16px":"0",borderBottom:i<2?"1.5px solid #eee":"none"}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:"#1a1a1a",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,flexShrink:0}}>{i+1}</div>
                  <p style={{fontSize:15,color:"#222",fontWeight:600,margin:0,lineHeight:1.7}}>{s}</p>
                </div>
              ))}
            </div>

            <div style={{background:"#F0FFF4",border:"2px solid #06C755",borderRadius:14,padding:"28px 24px",marginBottom:18,textAlign:"center",opacity:rev>=4?1:0,transition:"opacity .4s .3s"}}>
              <div style={{fontSize:28,marginBottom:12}}>🎁</div>
              <h3 style={{fontSize:18,fontWeight:800,color:"#1a1a1a",margin:"0 0 10px",lineHeight:1.5}}>もっと詳しく診断したい方へ</h3>
              <p style={{fontSize:15,color:"#444",lineHeight:1.9,margin:"0 0 20px"}}>
                LINE登録で<span style={{color:"#06C755",fontWeight:800}}>30問の完全診断</span>を無料プレゼント中🎉<br/>
                副業ロードマップ付きでさらに詳しく分析します
              </p>
              <a href={LINE_URL} target="_blank" rel="noopener noreferrer" className="line-btn" style={{display:"inline-block",padding:"16px 36px",background:"#06C755",color:"#fff",fontSize:16,fontWeight:800,borderRadius:50,textDecoration:"none",boxShadow:"0 4px 16px rgba(6,199,85,0.3)",transition:"all .2s",letterSpacing:.5}}>
                LINEで完全版を受け取る（無料）
              </a>
              <p style={{fontSize:12,color:"#999",marginTop:12}}>無料・いつでも解除できます</p>
            </div>

            <button className="rb" onClick={restart} style={{width:"100%",padding:"15px 0",background:"#EDEAE4",border:"2px solid #C8C4BC",borderRadius:10,color:"#555",fontSize:15,fontWeight:600,cursor:"pointer",transition:"all .2s",opacity:rev>=5?1:0}}>
              もう一度診断する
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
