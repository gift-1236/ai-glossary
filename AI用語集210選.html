<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>AI横文字・用語集｜ichiko</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Meiryo',sans-serif;background:#f8f8f6;color:#222;padding:1rem}
.top{text-align:center;padding:1.5rem 0 1rem;border-bottom:1px solid #e0e0da;margin-bottom:1rem}

.tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:0.75rem}
.tab{font-size:11px;padding:5px 11px;border-radius:20px;border:1px solid #ccc;background:#fff;cursor:pointer;color:#555;font-family:inherit}
.tab.on{background:#222;color:#fff;border-color:#222;font-weight:700}
.count-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.count{font-size:11px;color:#aaa}

.add-btn:hover{background:#222;color:#fff}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:90%;max-width:480px}
.modal h2{font-size:16px;font-weight:700;margin-bottom:1rem}
.modal label{font-size:12px;color:#666;display:block;margin-bottom:3px;margin-top:10px}
.modal input,.modal select,.modal textarea{width:100%;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;outline:none;font-family:inherit}
.modal textarea{resize:vertical;min-height:70px}
.modal-btns{display:flex;gap:8px;margin-top:1.25rem}
.modal-btns button{flex:1;padding:9px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:inherit;font-weight:700}
.btn-save{background:#222;color:#fff}
.btn-cancel{background:#eee;color:#555}

.card.user-card{border-color:#c8e6c9;background:#f9fff9}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;display:inline-block;margin-bottom:6px}
.b-basic{background:#e8f5e9;color:#2e7d32}
.b-tool{background:#ede7f6;color:#4527a0}
.b-tech{background:#fff8e1;color:#e65100}
.b-image{background:#fce4ec;color:#880e4f}
.b-video{background:#fbe9e7;color:#bf360c}
.b-biz{background:#e3f2fd;color:#0d47a1}
.b-ai{background:#f1f8e9;color:#33691e}
.b-dev{background:#ffeee0;color:#a63a00}
.b-sns{background:#fce4ff;color:#6a0080}
.b-user{background:#e8f5e9;color:#1b5e20}
.term{font-size:14px;font-weight:700;color:#111;line-height:1.3;margin-bottom:2px}
.read{font-size:10px;color:#aaa;margin-bottom:6px}
.desc{font-size:12px;color:#555;line-height:1.7}

</head>
<body>
<div class="top">
  <h1>AI横文字・用語集</h1>
  <p>カテゴリ別にまとめて解説｜ichiko</p>
</div>
<div class="search-row">
  <input type="text" id="q" placeholder="用語を検索… 例：バイブコーディング、カルーセル、HTML" oninput="render()">
</div>
<div class="tabs">
  <button class="tab on" onclick="setTab('all',this)">全部</button>
  <button class="tab" onclick="setTab('basic',this)">基本</button>
  <button class="tab" onclick="setTab('ai',this)">AIツール</button>
  <button class="tab" onclick="setTab('image',this)">画像AI</button>
  <button class="tab" onclick="setTab('video',this)">動画・音声</button>
  <button class="tab" onclick="setTab('biz',this)">ビジネス活用</button>
  <button class="tab" onclick="setTab('sns',this)">SNS・発信</button>
  <button class="tab" onclick="setTab('tech',this)">技術系</button>
  <button class="tab" onclick="setTab('tool',this)">機能・ツール名</button>
  <button class="tab" onclick="setTab('dev',this)">開発・環境系</button>
  <button class="tab" onclick="setTab('user',this)">✏️ 自分で追加</button>
</div>
<div class="count-row">
  <span id="count" class="count"></span>
  <button class="add-btn" onclick="openModal()">＋ 用語を追加する</button>
</div>
<div id="out"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>✏️ 用語を追加する</h2>
    <label>用語名（必須）</label>
    <input type="text" id="in-term" placeholder="例：ダッシュボード">
    <label>読み方</label>
    <input type="text" id="in-read" placeholder="例：ダッシュボード">
    <label>カテゴリ</label>
    <select id="in-cat">
      <option value="user">✏️ 自分で追加</option>
      <option value="basic">基本</option>
      <option value="ai">AIツール</option>
      <option value="biz">ビジネス活用</option>
      <option value="sns">SNS・発信</option>
      <option value="tech">技術系</option>
      <option value="tool">機能・ツール名</option>
      <option value="dev">開発・環境系</option>
    </select>
    <label>解説（必須）</label>
    <textarea id="in-desc" placeholder="わかりやすく一言で説明してね"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="addWord()">追加する</button>
    </div>
  </div>
</div>

const CAT_LABEL={all:"全部",basic:"基本",ai:"AIツール",image:"画像AI",video:"動画・音声",biz:"ビジネス活用",sns:"SNS・発信",tech:"技術系",tool:"機能・ツール名",dev:"開発・環境系",user:"✏️ 自分で追加"};
const CAT_ORDER=["basic","ai","image","video","biz","sns","tech","tool","dev","user"];
let tab="all";
let USER=[];
try{USER=JSON.parse(localStorage.getItem("ai_glossary_user")||"[]");}catch(e){}

function allData(){return[...BASE,...USER];}

function setTab(t,el){
  tab=t;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));
  el.classList.add("on");
  document.getElementById("q").value="";
  render();
}

function render(){
  const q=document.getElementById("q").value.toLowerCase();
  const data=allData();
  let items=data.filter(g=>{
    if(tab!=="all"&&g.c!==tab)return false;
    if(q&&!g.t.toLowerCase().includes(q)&&!g.r.includes(q)&&!g.d.includes(q))return false;
    return true;
  });
  document.getElementById("count").textContent=items.length+"件";
  if(!items.length){document.getElementById("out").innerHTML='<div class="empty">見つかりませんでした</div>';return;}
  let html="";
  if(tab==="all"&&!q){
    CAT_ORDER.forEach(cat=>{
      const grp=items.filter(g=>g.c===cat);
      if(!grp.length)return;
      html+=`<div class="sec-title">${CAT_LABEL[cat]}（${grp.length}件）</div><div class="grid">`;
      html+=grp.map(g=>card(g)).join("");
      html+="</div>";
    });
  }else{
    html='<div class="grid">'+items.map(g=>card(g)).join("")+"</div>";
  }
  document.getElementById("out").innerHTML=html;
}

function card(g){
  const isUser=USER.some(u=>u.t===g.t);
  const del=isUser?`<button class="del-btn" onclick="deleteWord('${g.t.replace(/'/g,"\\'")}')">✕</button>`:"";
  return`<div class="card${isUser?" user-card":""}">${del}<span class="badge b-${g.c}">${CAT_LABEL[g.c]}</span><div class="term">${g.t}</div><div class="read">${g.r}</div><div class="desc">${g.d}</div></div>`;
}

function openModal(){
  document.getElementById("in-term").value="";
  document.getElementById("in-read").value="";
  document.getElementById("in-cat").value="user";
  document.getElementById("in-desc").value="";
  document.getElementById("modal").classList.add("show");
  setTimeout(()=>document.getElementById("in-term").focus(),100);
}
function closeModal(){document.getElementById("modal").classList.remove("show");}

function addWord(){
  const t=document.getElementById("in-term").value.trim();
  const r=document.getElementById("in-read").value.trim();
  const c=document.getElementById("in-cat").value;
  const d=document.getElementById("in-desc").value.trim();
  if(!t||!d){alert("用語名と解説は必須だよ！");return;}
  USER.push({t,r:r||t,c,d});
  try{localStorage.setItem("ai_glossary_user",JSON.stringify(USER));}catch(e){}
  closeModal();
  render();
}

function deleteWord(term){
  if(!confirm(`「${term}」を削除する？`))return;
  USER=USER.filter(u=>u.t!==term);
  try{localStorage.setItem("ai_glossary_user",JSON.stringify(USER));}catch(e){}
  render();
}

document.getElementById("modal").addEventListener("click",function(e){if(e.target===this)closeModal();});
render();
</script>
