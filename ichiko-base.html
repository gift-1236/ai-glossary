<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>いちこベース</title>
<link rel="apple-touch-icon" href="ichiko-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="いちこベース">
<meta name="theme-color" content="#3B2A24">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#C2255C;        /* 濃いピンク */
    --pink-deep:#A61E4D;
    --pink-soft:#F9E7EE;
    --mint:#4FA98C;        /* ミントグリーン */
    --mint-soft:#E8F3EF;
    --brown:#3B2A24;       /* チョコブラウン */
    --brown-mid:#5C463D;
    --cream:#FAF6F1;
    --card:#FFFFFF;
    --line:#EAE0D6;
    --ink:#3B2A24;
    --sub:#9C8B80;
    --red:#C0392B;
    --serif:'Shippori Mincho', serif;
    --sans:'Zen Kaku Gothic New','Hiragino Sans','Yu Gothic',sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--cream); color:var(--ink);
    font-family:var(--sans); min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .layout{display:flex; min-height:100vh;}

  /* ================= sidebar ================= */
  .sidebar{
    width:236px; flex-shrink:0; padding:34px 18px 24px;
    background:var(--brown); color:#EFE6DE;
    display:flex; flex-direction:column; gap:2px;
  }
  .brand{
    font-family:var(--serif); font-size:21px; font-weight:700;
    letter-spacing:3px; padding:0 12px; color:#FBF4EE;
  }
  .brand .dot{color:var(--pink); font-family:var(--sans);}
  .brand small{
    display:block; font-family:var(--sans); font-size:9px; font-weight:500;
    letter-spacing:4px; color:#A38F84; margin-top:8px;
  }
  .side-rule{height:1px; background:rgba(239,230,222,.14); margin:22px 12px 18px;}
  .nav-btn{
    display:flex; align-items:center; gap:11px; padding:11px 13px; border:none;
    background:transparent; color:#CBB9AE; font-size:13.5px; font-weight:500;
    border-radius:10px; cursor:pointer; font-family:var(--sans); text-align:left;
    transition:all .18s; width:100%; letter-spacing:.5px;
  }
  .nav-btn:hover{color:#FBF4EE; background:rgba(255,255,255,.05);}
  .nav-btn.active{background:#FBF4EE; color:var(--brown); font-weight:700;}
  .nav-dot{width:7px; height:7px; border-radius:50%; flex-shrink:0;}
  .nav-count{margin-left:auto; font-size:11px; color:#8A776C; font-weight:500;}
  .nav-btn.active .nav-count{color:var(--pink);}
  .sidebar .spacer{flex:1;}
  .side-tool{font-size:12px; color:#A38F84;}
  .side-tool:hover{color:#EFE6DE;}

  /* ================= main ================= */
  .main{flex:1; padding:34px 30px 90px; max-width:1080px;}
  .topbar{display:flex; gap:14px; align-items:flex-end; margin-bottom:26px; flex-wrap:wrap;}
  .hello{font-family:var(--serif); font-size:19px; font-weight:600; letter-spacing:1px;}
  .hello small{
    display:block; font-family:var(--sans); font-size:11px; color:var(--sub);
    font-weight:500; margin-top:5px; letter-spacing:1.5px;
  }
  .search{
    flex:1; min-width:200px; display:flex; align-items:center; gap:9px;
    background:var(--card); border:1px solid var(--line); border-radius:10px; padding:11px 15px;
    transition:border-color .2s;
  }
  .search:focus-within{border-color:var(--pink);}
  .search span{color:var(--sub); font-size:13px;}
  .search input{border:none; outline:none; flex:1; font-size:13.5px; font-family:var(--sans); background:transparent; color:var(--ink);}
  .add-btn{
    border:none; background:var(--pink); color:#fff; font-weight:700; font-size:13px;
    padding:12px 24px; border-radius:10px; cursor:pointer; font-family:var(--sans);
    letter-spacing:2px; transition:background .18s, transform .12s;
  }
  .add-btn:hover{background:var(--pink-deep);}
  .add-btn:active{transform:scale(.97);}

  /* ================= cards ================= */
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px;}
  .item-card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:18px 18px 14px; cursor:pointer; position:relative;
    box-shadow:0 1px 3px rgba(59,42,36,.04);
    transition:transform .15s, box-shadow .15s, border-color .15s;
    display:flex; flex-direction:column; gap:9px;
  }
  .item-card:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(59,42,36,.09);
    border-color:#DECFC2;
  }
  .cat-line{display:flex; align-items:center; gap:7px;}
  .cat-dot{width:8px; height:8px; border-radius:50%;}
  .cat-name{font-size:10px; font-weight:700; letter-spacing:2.5px; color:var(--sub);}
  .pin{margin-left:auto; font-size:12px; color:var(--pink);}
  .item-title{
    font-family:var(--serif); font-size:15.5px; font-weight:600; line-height:1.55;
    letter-spacing:.3px;
  }
  .item-desc{font-size:12px; color:var(--sub); line-height:1.8; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .tag-row{display:flex; flex-wrap:wrap; gap:5px;}
  .tag{
    font-size:10px; color:var(--brown-mid); padding:2.5px 9px; border-radius:99px;
    border:1px solid var(--line); font-weight:500; letter-spacing:.5px; background:var(--cream);
  }
  .card-foot{display:flex; align-items:center; gap:7px; margin-top:auto; padding-top:6px; border-top:1px solid #F4EDE5;}
  .mini-btn{
    border:1px solid; background:transparent; font-family:var(--sans); font-size:11px;
    font-weight:700; cursor:pointer; padding:6px 13px; border-radius:8px;
    letter-spacing:1px; transition:all .15s;
  }
  .open-btn{color:var(--mint); border-color:#C7E2D9;}
  .open-btn:hover{background:var(--mint); border-color:var(--mint); color:#fff;}
  .copy-btn{color:var(--pink); border-color:#EFC9D8;}
  .copy-btn:hover{background:var(--pink); border-color:var(--pink); color:#fff;}
  .date{margin-left:auto; font-size:10px; color:#C6B8AD; letter-spacing:1px;}

  .empty{
    text-align:center; color:var(--sub); font-size:13px; padding:80px 20px; line-height:2.3;
    grid-column:1/-1; font-family:var(--serif); letter-spacing:1px;
  }
  .empty .big{font-size:34px; margin-bottom:6px;}

  /* ================= modal ================= */
  .overlay{
    position:fixed; inset:0; background:rgba(59,42,36,.5); z-index:100;
    display:none; align-items:flex-end; justify-content:center;
    backdrop-filter:blur(2px);
  }
  .overlay.show{display:flex;}
  .sheet{
    background:var(--cream); width:100%; max-width:640px; max-height:90vh; overflow-y:auto;
    border-radius:20px 20px 0 0; padding:18px 22px 44px;
  }
  .handle{width:38px; height:4px; background:#DCCEC2; border-radius:99px; margin:0 auto 18px;}
  .sheet h2{
    font-family:var(--serif); font-size:17px; font-weight:600; margin:0 0 18px;
    letter-spacing:2px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block; font-size:10px; font-weight:700; color:var(--sub);
    margin-bottom:6px; letter-spacing:2.5px;
  }
  .field input[type=text], .field textarea{
    width:100%; border:1px solid var(--line); border-radius:10px; padding:12px 14px;
    font-size:14px; font-family:var(--sans); outline:none; background:#fff; color:var(--ink);
    transition:border-color .2s;
  }
  .field input:focus, .field textarea:focus{border-color:var(--pink);}
  .field textarea{resize:vertical; line-height:1.9;}
  .cat-picker{display:flex; gap:7px; flex-wrap:wrap;}
  .cat-opt{
    display:flex; align-items:center; gap:7px;
    border:1px solid var(--line); background:#fff; border-radius:99px; padding:8px 15px;
    font-size:12px; font-weight:700; cursor:pointer; font-family:var(--sans); color:var(--sub);
    letter-spacing:1px; transition:all .15s;
  }
  .cat-opt .cat-dot{width:7px; height:7px;}
  .cat-opt.sel{background:var(--brown); border-color:var(--brown); color:#FBF4EE;}
  .check-row{display:flex; align-items:center; gap:9px; font-size:13px; font-weight:500; margin:6px 0 16px; letter-spacing:.5px;}
  .check-row input{accent-color:var(--pink);}
  .sheet-actions{display:flex; gap:10px; margin-top:8px;}
  .save-btn{
    flex:1; border:none; background:var(--pink); color:#fff; font-weight:700; font-size:14px;
    padding:15px 0; border-radius:10px; cursor:pointer; font-family:var(--sans); letter-spacing:4px;
    transition:background .18s;
  }
  .save-btn:hover{background:var(--pink-deep);}
  .del-btn{border:none; background:transparent; color:var(--red); font-size:12px; cursor:pointer; font-family:var(--sans); padding:12px 16px; font-weight:500; letter-spacing:1px;}

  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--brown); color:#FBF4EE; font-size:12.5px; font-weight:500;
    padding:12px 26px; border-radius:99px; z-index:200; opacity:0; transition:all .25s;
    pointer-events:none; letter-spacing:1.5px;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ================= mobile ================= */
  .m-nav{display:none;}
  @media (max-width:760px){
    .sidebar{display:none;}
    .main{padding:24px 16px 116px;}
    .hello{font-size:17px;}
    .m-nav{
      display:flex; position:fixed; bottom:0; left:0; right:0; z-index:50;
      background:var(--brown); overflow-x:auto; padding:6px 6px 14px;
    }
    .m-nav button{
      flex:1; min-width:60px; border:none; background:transparent; font-family:var(--sans);
      font-size:9.5px; font-weight:500; color:#A38F84; cursor:pointer; padding:8px 2px 0;
      letter-spacing:1px; transition:color .15s;
    }
    .m-nav button .m-dot{
      display:block; width:7px; height:7px; border-radius:50%; margin:0 auto 6px;
      background:currentColor; opacity:.5;
    }
    .m-nav button.active{color:#FBF4EE;}
    .m-nav button.active .m-dot{opacity:1;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(162px,1fr)); gap:11px;}
    .item-card{padding:14px 14px 11px;}
  }
</style>
</head>
<body>

<div class="layout">
  <!-- sidebar (PC) -->
  <aside class="sidebar">
    <div class="brand">いちこベース<span class="dot">.</span><small>IDEAS / PROMPTS / APPS</small></div>
    <div class="side-rule"></div>
    <div id="navPc"></div>
    <div class="spacer"></div>
    <button class="nav-btn side-tool" onclick="exportData()">バックアップ保存</button>
    <button class="nav-btn side-tool" onclick="document.getElementById('importFile').click()">バックアップ読込</button>
  </aside>

  <!-- main -->
  <main class="main">
    <div class="topbar">
      <div class="hello">おかえりなさい、いちこさん。<small id="statLine"></small></div>
      <div class="search"><span>検索</span><input id="searchBox" placeholder="タイトル・タグ・本文" oninput="render()"></div>
      <button class="add-btn" onclick="openEditor()">＋ 追加</button>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<!-- mobile nav -->
<nav class="m-nav" id="navMobile"></nav>

<!-- editor sheet -->
<div class="overlay" id="editorOverlay" onclick="if(event.target===this)closeEditor()">
  <div class="sheet">
    <div class="handle"></div>
    <h2 id="editorTitle">新しく追加</h2>
    <div class="field"><label>カテゴリ</label><div class="cat-picker" id="catPicker"></div></div>
    <div class="field"><label>タイトル *</label><input type="text" id="fTitle" placeholder="例）パンダキャラ画像生成GPT"></div>
    <div class="field"><label>ひとこと説明</label><input type="text" id="fDesc" placeholder="何に使うもの？"></div>
    <div class="field"><label>URL（あれば）</label><input type="text" id="fUrl" placeholder="https://..."></div>
    <div class="field"><label>本文（プロンプト全文・メモなど）</label><textarea id="fBody" rows="5" placeholder="プロンプトはここに全文貼っておくと、カードからワンタップコピーできます"></textarea></div>
    <div class="field"><label>タグ（カンマ区切り）</label><input type="text" id="fTags" placeholder="画像生成, いちこ, note用"></div>
    <label class="check-row"><input type="checkbox" id="fPin"> 上部にピン留めする</label>
    <div class="sheet-actions">
      <button class="save-btn" onclick="saveItem()">保存する</button>
      <button class="del-btn" id="delBtn" onclick="deleteItem()" style="display:none">削除</button>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
<div class="toast" id="toast"></div>

<script>
// ================= categories =================
const CATS = [
  {key:"all",    label:"すべて",           color:"#8A776C"},
  {key:"gpts",   label:"GPTs置き場",       color:"#C2255C"},
  {key:"prompt", label:"プロンプト置き場", color:"#D9A94E"},
  {key:"app",    label:"アプリ",           color:"#4FA98C"},
  {key:"idea",   label:"アイデア",         color:"#B0637E"},
  {key:"link",   label:"リンク集",         color:"#7E93B8"},
];
const catOf = k => CATS.find(c=>c.key===k) || CATS[4];

// ================= seed data（初回のみ） =================
const SEED = [
  {cat:"app", title:"AI用語辞典200", desc:"200語のAI用語辞典。noteやXの導線にも使える基盤資産", url:"https://gift-1236.github.io/ai-glossary/ai-glossary-200.html", tags:["公開中","GitHub Pages"], pin:true},
  {cat:"app", title:"勤怠入力（スタッフ用）", desc:"とそうや スタッフ勤怠入力アプリ", url:"https://gift-1236.github.io/ai-glossary/kintai_staff.html", tags:["とそうや","業務"]},
  {cat:"app", title:"勤怠管理（管理用）", desc:"とそうや 勤怠管理画面", url:"https://gift-1236.github.io/ai-glossary/kintai.html", tags:["とそうや","業務"]},
  {cat:"idea", title:"フォロワー心理翻訳機", desc:"投稿を貼ると読者の心の声をAIが翻訳するアプリ案", tags:["アプリ案","SNS"]},
  {cat:"idea", title:"アイデア銀行", desc:"預けたアイデアにAIが利息を付けて育てるメモアプリ", tags:["アプリ案"]},
  {cat:"prompt", title:"（例）プロンプトはここに貯める", desc:"本文にプロンプト全文を入れるとワンタップコピーできます", body:"あなたはプロのコピーライターです。以下の文章を、AIっぽさを消して自然な日本語に書き直してください。\n\n【文章】\n（ここに貼る）", tags:["サンプル"]},
];

// ================= storage =================
const KEY = "ichiko-base:v1";
let memStore = null;
function loadAll(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ if(memStore) return memStore; }
  const init = SEED.map((s,i)=>({id:"seed"+i, created:Date.now()-i*1000, ...s}));
  persist(init);
  return init;
}
function persist(items){
  try{ localStorage.setItem(KEY, JSON.stringify(items)); }
  catch(e){ memStore = items; }
}

let items = loadAll();
let currentCat = "all";
let editingId = null;
let selCat = "idea";

// ================= render =================
function fmtDate(ts){ const d=new Date(ts); return `${d.getMonth()+1}.${d.getDate()}`; }

function buildNav(){
  const counts = {};
  items.forEach(i=>counts[i.cat]=(counts[i.cat]||0)+1);
  const pc = document.getElementById("navPc");
  const mb = document.getElementById("navMobile");
  pc.innerHTML = ""; mb.innerHTML = "";
  CATS.forEach(c=>{
    const n = c.key==="all" ? items.length : (counts[c.key]||0);
    const b = document.createElement("button");
    b.className = "nav-btn"+(currentCat===c.key?" active":"");
    b.innerHTML = `<span class="nav-dot" style="background:${c.color}"></span>${c.label}<span class="nav-count">${n}</span>`;
    b.onclick = ()=>{currentCat=c.key; buildNav(); render();};
    pc.appendChild(b);
    const m = document.createElement("button");
    m.className = currentCat===c.key?"active":"";
    m.innerHTML = `<span class="m-dot" style="background:${c.color}"></span>${c.label.replace("置き場","")}`;
    m.onclick = ()=>{currentCat=c.key; buildNav(); render();};
    mb.appendChild(m);
  });
}

function render(){
  const q = document.getElementById("searchBox").value.trim().toLowerCase();
  const grid = document.getElementById("grid");
  let list = items.filter(i => currentCat==="all" || i.cat===currentCat);
  if(q){
    list = list.filter(i =>
      (i.title||"").toLowerCase().includes(q) ||
      (i.desc||"").toLowerCase().includes(q) ||
      (i.body||"").toLowerCase().includes(q) ||
      (i.tags||[]).join(",").toLowerCase().includes(q)
    );
  }
  list.sort((a,b)=> (b.pin?1:0)-(a.pin?1:0) || b.created-a.created);

  document.getElementById("statLine").textContent = `資産 ${items.length} 件を保管中`;

  if(!list.length){
    grid.innerHTML = `<div class="empty"><div class="big">🐼</div>まだ何もありません。<br>「＋追加」から集めはじめましょう。</div>`;
    return;
  }
  grid.innerHTML = "";
  list.forEach(i=>{
    const c = catOf(i.cat);
    const card = document.createElement("div");
    card.className = "item-card";
    card.onclick = ()=>openEditor(i.id);
    card.innerHTML = `
      <div class="cat-line">
        <span class="cat-dot" style="background:${c.color}"></span>
        <span class="cat-name">${c.label}</span>
        ${i.pin?'<span class="pin">●PIN</span>':""}
      </div>
      <div class="item-title">${esc(i.title)}</div>
      ${i.desc?`<div class="item-desc">${esc(i.desc)}</div>`:""}
      ${(i.tags&&i.tags.length)?`<div class="tag-row">${i.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>`:""}
      <div class="card-foot">
        ${i.url?`<button class="mini-btn open-btn" onclick="event.stopPropagation();window.open('${esc(i.url)}','_blank')">開く</button>`:""}
        ${i.body?`<button class="mini-btn copy-btn" onclick="event.stopPropagation();copyBody('${i.id}')">コピー</button>`:""}
        <span class="date">${fmtDate(i.created)}</span>
      </div>`;
    grid.appendChild(card);
  });
}

function esc(s){ return String(s).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

// ================= editor =================
function buildCatPicker(){
  const p = document.getElementById("catPicker");
  p.innerHTML = "";
  CATS.filter(c=>c.key!=="all").forEach(c=>{
    const b = document.createElement("button");
    b.className = "cat-opt"+(selCat===c.key?" sel":"");
    b.innerHTML = `<span class="cat-dot" style="background:${c.color}"></span>${c.label}`;
    b.onclick = ()=>{selCat=c.key; buildCatPicker();};
    p.appendChild(b);
  });
}

function openEditor(id){
  editingId = id || null;
  const it = items.find(x=>x.id===id);
  document.getElementById("editorTitle").textContent = it ? "編集" : "新しく追加";
  document.getElementById("fTitle").value = it?.title || "";
  document.getElementById("fDesc").value = it?.desc || "";
  document.getElementById("fUrl").value = it?.url || "";
  document.getElementById("fBody").value = it?.body || "";
  document.getElementById("fTags").value = (it?.tags||[]).join(", ");
  document.getElementById("fPin").checked = !!it?.pin;
  document.getElementById("delBtn").style.display = it ? "block" : "none";
  selCat = it?.cat || (currentCat!=="all" ? currentCat : "idea");
  buildCatPicker();
  document.getElementById("editorOverlay").classList.add("show");
}
function closeEditor(){ document.getElementById("editorOverlay").classList.remove("show"); }

function saveItem(){
  const title = document.getElementById("fTitle").value.trim();
  if(!title){ toast("タイトルを入れてください"); return; }
  const obj = {
    cat: selCat,
    title,
    desc: document.getElementById("fDesc").value.trim(),
    url: document.getElementById("fUrl").value.trim(),
    body: document.getElementById("fBody").value,
    tags: document.getElementById("fTags").value.split(",").map(t=>t.trim()).filter(Boolean),
    pin: document.getElementById("fPin").checked,
  };
  if(editingId){
    const i = items.findIndex(x=>x.id===editingId);
    items[i] = {...items[i], ...obj};
  }else{
    items.unshift({id:Date.now().toString(36), created:Date.now(), ...obj});
  }
  persist(items);
  closeEditor(); buildNav(); render();
  toast("保存しました");
}

function deleteItem(){
  if(!editingId) return;
  if(!confirm("このカードを削除しますか？")) return;
  items = items.filter(x=>x.id!==editingId);
  persist(items);
  closeEditor(); buildNav(); render();
  toast("削除しました");
}

// ================= copy / backup =================
function copyBody(id){
  const it = items.find(x=>x.id===id);
  if(!it?.body) return;
  navigator.clipboard.writeText(it.body).then(
    ()=>toast("コピーしました"),
    ()=>toast("コピーに失敗しました")
  );
}

function exportData(){
  const blob = new Blob([JSON.stringify(items,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = `ichiko-base-backup-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}.json`;
  a.click();
  toast("バックアップを保存しました");
}

function importData(input){
  const f = input.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const arr = JSON.parse(r.result);
      if(!Array.isArray(arr)) throw 0;
      items = arr;
      persist(items);
      buildNav(); render();
      toast("バックアップを読み込みました");
    }catch(e){ toast("ファイルを読み込めませんでした"); }
  };
  r.readAsText(f);
  input.value = "";
}

let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 2000);
}

buildNav(); render();
</script>
</body>
</html>
